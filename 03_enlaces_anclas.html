<!-- los enlaces o anclas o hipervinculos -->
 <!-- a (anchor) siignifica ancla. metafora: como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde buscar un recurso o hacia donde navegar en la pagina web-->
  <!--Lo atributos son caracteristicas que definen el comportamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por etsa razon que se utiliza en el maquetado y no en el css dado que no es una caracteristica visual. -->
  <!-- href(hyper reference) es la referencia a un recurso, es decir, eldestino del enlace. -->
<!-- lo que esta adentro de la etiqueta a es el texto visible que el usuario vera en la pagina web. Mientras que lo que esta adentro de href es la referencia al recurso al que apunta el enlace. -->
 <h2 title="titulo de pagina">Enlace o anclas</h2>
 <!-- por otra parte, el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologias de asistencia como lectores de pantalla utilizan este atributo para proporcionar informacion adicional al usuario. En el caso de personas invidentes esto les permite acceder informacion adicional sobre el enlace.-->
    
 <a href="https://www.google.com">google</a>
<br>
<a href="https://www.facebook.com">facebook</a>
<br>
<a href="https://www.youtube.com">youtube</a>
<br>
 <a title="ir al canal de youtube" href="//youtube.com/@ramcrack0584">Ramcrack</a>  <!--Mala practica: usar protocolo relativo sin especificar el protocolo-->

 <h2>Enlaces con target a otra ventana</h2>
 <a href="03-4_pagina_enlace4.html" target="_blank">ir a enlacce cuatro en nueva ventana</a>
