<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrafos y Encabezados</title>
</head>
<body>
<!-- Titulos o encabezados:
Se tienen 6 tipos de encabezados, desde el h1 hasta el h6. -->
<!-- (h$*6) Crea 6 titulos en orden del 1 al 6 Emmet -->
    <h1>Titulo</h1>
    <!-- El h1 se utiliza una sola vez por pagina web esto es debido a que el h1 tiene una importacia en el CEO lo que es el posicionamiento web, es decir, google le da mucha importancia al h1-->
     <h2>Subtitulo</h2>
     <h3>Subtitulo</h3>
     <h4>Subtitulo</h4>
     <h5>Subtitulo</h5>
     <h6>Subtitulo</h6>
<!-- Desde el h2 hasta el h6, se pueden utilizar las veces que sean necesarias segun el contenido que se requiera recrear. -->

<!-- Parrafo: Los parrafos sodeben tener una idea o un punto especifico.
Cada parrafo escrcito debe de contener un concepto, una idea. Es decir, pueden describir una sección o un elemento. Hasta un mensaje en el chat. Por ejemplo, en una seccion habla sobre los beneficios del ejercicio:
Un parrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmente, debe existir un motivo para que exista un parrafo -->
<p>
    Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestiae sit esse dolor, voluptatem at molestias optio dolores autem quidem mollitia fugit debitis enim odit consectetur asperiores assumenda fugiat eaque placeat?
</p>
<!-- (CTRL+SHTT+p) o (ALT+Z) Ajusta el contenido del parrafo a la ventana del editor-->
<!-- Existen algunas tecnologias de asistencia como lectores de pantalla , que ayudan a las personas cpn discapacidad visual a navegar por el contenido web.
Por ejemplo: cuando estas tecnologias leen h1 de la pagina, entienden de que trata la pagina por el h1. Por temas de accesibiidad web es importante que se utilice solo un h1 por pagina. -->
</body>
</html>
