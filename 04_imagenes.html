<body>
    <!-- etiqueta de bloque y etiqueta de linea -->
     <h1>imagenes</h1>
<!-- las imagenes se insertan en HTML utilizando la etiqueta img. esta etiqueta es un elemento vacio, lo que significa que no tiene una etiqueta de cierre. La sintaxis basica para insertar una imagen es: -->

<!-- Vale la pena recordar que el atributo title proporciona un tooltip que se muestra cuando el ususario pasa e mouse sobre la imagen-->
<img src="04_imagen.png" alt="Logotipo de HTML5" title="HTML5"  width="200" height="200">
<!-- Para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (alternative text) es muy importante puesto que proporciona una descripcion textual de la imagen para accesibilidad y como fallback si no se carga. El texto alternativo debe ser descriptivo y consiso, y debe transmitir la informacion esencial que la imagen representa. Por ejemplo, si la imagen es un logotpo de una empresa, el texto alternativo podria ser "Logotipo dela empresa xyz". Si la imagen es una fotografia de una paisaje podria ser "fotografia de un paisaje con montañas y lago". En resumen, el atributo alt proporciona una descripcion de la imange en caso de que no se pueda cargar.-->

<!-- Self Closing lags son etiquetas que se autocierran -->

</body>
</html>
